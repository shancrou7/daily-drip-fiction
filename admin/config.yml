backend:
  name: git-gateway
  branch: main # Change to master if your default GitHub branch is master

media_folder: "assets/images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Website Content"
    files:
      - file: "content/stories.json"
        name: "series_manager"
        label: "Series & Feed Manager"
        fields:
          - name: "series_list"
            label: "Fictional Universes / Series"
            widget: "list"
            allow_add: true
            summary: "{{fields.series_title}} ({{fields.status}})"
            fields:
              - name: "series_title"
                label: "Series Title (e.g., The Legends Volume 1)"
                widget: "string"
              - name: "status"
                label: "Series Status"
                widget: "select"
                options: ["Active", "Archived"]
                default: "Active"
              - name: "description"
                label: "Short Archive Description"
                widget: "string"
                hint: "A brief summary shown to readers browsing the archives tab."
              - name: "entries"
                label: "Story Entries"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - name: "title"
                    label: "Title / Day Number (e.g., Day 44)"
                    widget: "string"
                  - name: "date"
                    label: "Publish Date"
                    widget: "datetime"
                    date_format: "MMMM D, YYYY"
                    time_format: false
                  - name: "body"
                    label: "Story Text Block (100-150 words)"
                    widget: "text"

backend:
  name: git-gateway
  branch: main # Change to master if your default GitHub branch is master

media_folder: "assets/images"
public_folder: "/images"

collections:
  - name: "feed"
    label: "Current Feed"
    folder: "content/blog" # This is the folder path in GitHub where your story markdown files live
    create: true
    slug: "day-{{fields.title}}"
    editor:
      preview: false # Disables the default preview pane to keep the editor clean and fast
    fields:
      - name: "title"
        label: "Title / Day Number (e.g., 44)"
        widget: "string"
      - name: "date"
        label: "Publish Date"
        widget: "datetime"
      - name: "body"
        label: "Story Text Block (100-150 words)"
        widget: "markdown"

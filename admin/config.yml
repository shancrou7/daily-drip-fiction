backend:
name: git-gateway
branch: main
media_folder: "images"
public_folder: "/images"
collections:
- name: "stories"
label: "Daily Stories"
files:
- file: "data/stories.json"
label: "Stories Production Database"
name: "stories_database"
fields:
- name: "entries"
label: "Story Entries"
label_singular: "Individual Story Entry"
widget: "list"
fields:
- { name: "day", label: "Day Number (e.g. Day 44)", widget: "string" }
- { name: "date", label: "Publish Date", widget: "date" }
- { name: "body", label: "Story Text Block (100-150 words)", widget:
"text" }
